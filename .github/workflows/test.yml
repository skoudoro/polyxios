name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 2 * * Mon"  # weekly

concurrency:
  group: test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  test:
    if: github.event_name != 'schedule' || github.repository_owner == 'fury-gl'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install OpenMP (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libomp
          echo "CC=clang" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "meson-python>=0.15" "Cython>=3.0" "numpy>=1.24" meson ninja

      - name: Install polyxios
        run: pip install --no-build-isolation -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --durations=10
