name: Release

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (use *-test suffix to skip PyPI)'
        required: true
        default: 'v0.0.0-test'

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_wheels:
    name: Wheels / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0

      - uses: actions/upload-artifact@v7
        with:
          name: dist-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v7
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  github_release:
    name: GitHub Release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - name: Extract changelog section
        id: changelog
        run: |
          python - <<'EOF'
          import re, os, sys
          tag = os.environ["TAG"].lstrip("v")
          try:
              with open("CHANGES.rst") as f:
                  content = f.read()
              pattern = rf"(?ms)^{re.escape(tag)}[^\n]*\n[-]+\n(.*?)(?=\n\S[^\n]*\n[-]+|\Z)"
              m = re.search(pattern, content)
              notes = m.group(1).strip() if m else ""
          except Exception:
              notes = ""
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              print(f"notes<<EOF_NOTES\n{notes}\nEOF_NOTES", file=fh)
          EOF
        env:
          TAG: ${{ env.RELEASE_TAG }}

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES="${{ steps.changelog.outputs.notes }}"
          if [ -n "$NOTES" ]; then
            echo "$NOTES" > release_notes.md
            echo "" >> release_notes.md
            echo "---" >> release_notes.md
            gh release create "${{ env.RELEASE_TAG }}" \
              dist/* \
              --title "polyxios ${{ env.RELEASE_TAG }}" \
              --notes-file release_notes.md \
              --generate-notes
          else
            gh release create "${{ env.RELEASE_TAG }}" \
              dist/* \
              --title "polyxios ${{ env.RELEASE_TAG }}" \
              --generate-notes
          fi

  publish_pypi:
    name: PyPI
    needs: [github_release]
    if: ${{ !contains(github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name, 'test') }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/polyxios/
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
